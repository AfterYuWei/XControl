name: Build Desktop Apps

# 触发条件：
# - 推送 tag (v*):  自动构建并发布正式 GitHub Release（版本号=tag名）
# - 手动触发:       可选择 release / nightly 模式
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: '构建类型'
        required: true
        default: 'nightly'
        type: choice
        options:
          - release
          - nightly

# 同一分支/标签的新构建取消旧的，避免资源浪费
concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

# Release 上传需要写权限
permissions:
  contents: write

jobs:
  # 判断本次构建是正式发布(tag)还是 nightly(main)
  prepare:
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.meta.outputs.is_release }}
      version: ${{ steps.meta.outputs.version }}
      release_name: ${{ steps.meta.outputs.release_name }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - id: meta
        run: |
          # tag 触发 或 手动选 release => 正式发布
          # main 触发 或 手动选 nightly => carry(nightly)
          if [[ "${{ github.ref_type }}" == "tag" ]] || [[ "${{ inputs.release_type }}" == "release" ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

          # 版本号 & tag：
          # - 正式版(tag): version=tag去v(如1.0.0), tag=原tag名
          # - carry(main): version=0.0.0-dev.YYYYMMDD.sha(semver预发布格式), tag=short commit
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "release_name=XControl $VERSION" >> $GITHUB_OUTPUT
          else
            DATE=$(date -u +%Y%m%d)
            VERSION="0.0.0-dev.${DATE}.${SHORT_SHA}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT
            echo "release_name=XControl Carry $SHORT_SHA" >> $GITHUB_OUTPUT
          fi

  # 三平台并行构建
  build:
    needs: prepare
    strategy:
      fail-fast: false   # 单平台失败不取消其它平台，便于排查
      matrix:
        include:
          - os: windows-latest
            platform: win
            goos: windows
            goarch: amd64
            ext: .exe
            dist_script: dist:win
            artifact_glob: "XControl-Setup-*"
          - os: macos-latest
            platform: mac-arm64
            goos: darwin
            goarch: arm64
            ext: ""
            dist_script: dist:mac
            artifact_glob: "XControl-*.dmg"
          - os: ubuntu-latest
            platform: linux
            goos: linux
            goarch: amd64
            ext: ""
            dist_script: dist:linux
            artifact_glob: "XControl-*.deb,XControl-*.rpm"

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux: deb 需要 binutils(ar), rpm 需要 rpm 工具。ubuntu-latest 默认无，需安装
      - name: Install Linux packaging tools
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends binutils rpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            web/package-lock.json
            electron/package.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: server/go.sum

      - name: Build frontend
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Build backend (embed frontend)
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -tags prod -o "xcontrol-server${{ matrix.ext }}" .

      - name: Install electron dependencies
        working-directory: electron
        run: npm install

      - name: Set version in package.json
        working-directory: electron
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          # 直接用 node 改写 package.json 的 version 字段。
          # 不用 npm version：它要求 semver 格式，carry 版的 short commit(如 393687e) 非法。
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version=process.env.APP_VERSION;fs.writeFileSync('package.json',JSON.stringify(p,null,2));console.log('version set to:',process.env.APP_VERSION);"

      # macOS：CI 按 job 的 goarch 动态设置 mac.target 架构，确保后端二进制与 dmg 架构一致
      - name: Pin mac target arch to current job
        if: startsWith(matrix.platform, 'mac')
        working-directory: electron
        env:
          MAC_ARCH: ${{ matrix.goarch }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.build.mac.target = [{ target: 'dmg', arch: process.env.MAC_ARCH }];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('mac.target arch set to:', process.env.MAC_ARCH);
          "

      # macOS 签名公证：配置 secrets.MAC_CERT_BASE64 后自动启用，无则禁用签名。
      # 用 $GITHUB_ENV 动态注入签名变量，避免空 CSC_LINK 被当路径报 "not a file"。
      - name: Setup macOS signing env
        if: startsWith(matrix.platform, 'mac')
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          if [ -z "$MAC_CERT_BASE64" ]; then
            # 无证书：禁用代码签名
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> $GITHUB_ENV
            echo "==> macOS 无签名证书，跳过代码签名"
          else
            # 有证书：导入到 keychain 并启用签名公证
            CERT_FILE=$RUNNER_TEMP/build.p12
            echo -n "$MAC_CERT_BASE64" | base64 --decode > $CERT_FILE
            security create-keychain -p "" build.keychain
            security import $CERT_FILE -k build.keychain -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
            echo "CSC_LINK=$MAC_CERT_BASE64" >> $GITHUB_ENV
            echo "CSC_KEY_PASSWORD=$MAC_CERT_PASSWORD" >> $GITHUB_ENV
            echo "==> macOS 已导入签名证书，启用代码签名"
          fi

      - name: Build Electron app
        working-directory: electron
        env:
          # GitHub Actions 专用：禁用 electron-builder 的自动更新检查，加速构建
          ELECTRON_BUILDER_OFFLINE: 'true'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS 公证信息（仅配置了 secrets 时有效，否则 electron-builder 忽略）
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run ${{ matrix.dist_script }}

      # 统一产物上传：正式版与 carry 版都先收集到 artifact，再由 release job 发到 Release
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xcontrol-${{ matrix.platform }}-${{ needs.prepare.outputs.version }}
          path: |
            electron/release/XControl-Setup-*
            electron/release/XControl-*.dmg
            electron/release/XControl-*.deb
            electron/release/XControl-*.rpm
          if-no-files-found: error
          retention-days: 30

  # 发布：正式版(tag)发正式 Release，carry 版(main)发 prerelease Release
  # 都用 softprops/action-gh-release 创建 Release 并上传所有平台安装包
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "=== 准备发布的安装包 ==="
          find artifacts -type f | sort
          echo "=== 总大小 ==="
          du -sh artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          body: |
            ## XControl ${{ needs.prepare.outputs.version }}

            ${{ needs.prepare.outputs.is_release == 'true' && '### ✅ 正式版' || '### 🔄 Carry 版（基于最新 main 分支构建）' }}

            ### 安装包

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `XControl-Setup-*-x64.exe` | NSIS 安装程序 |
            | macOS (Apple Silicon) | `XControl-*-arm64.dmg` | DMG 镜像 |
            | Linux (Debian/Ubuntu) | `XControl-*-x64.deb` | deb 安装包 |
            | Linux (Fedora/RHEL) | `XControl-*-x64.rpm` | rpm 安装包 |

            ### 安装说明

            - **Windows**: 双击 `.exe` 安装，支持自定义安装路径
            - **macOS**: 打开 `.dmg`，拖拽 XControl 到 Applications 文件夹
            - **Linux**: `sudo dpkg -i XControl-*.deb` 或 `sudo rpm -i XControl-*.rpm`
          files: |
            artifacts/XControl-Setup-*
            artifacts/XControl-*.dmg
            artifacts/XControl-*.deb
            artifacts/XControl-*.rpm
          draft: false
          # carry 版标记为预发布，正式版为正式发布
          prerelease: ${{ needs.prepare.outputs.is_release != 'true' }}
          generate_release_notes: true

